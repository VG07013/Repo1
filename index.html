<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VGRepo1 Sheet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="version-badge" id="versionBadge">Version loading...</div>

      <header class="hero-banner">
        <p class="hero-kicker">Quick contact form</p>
        <h1>VGRepo1 sheet</h1>
        <p class="hero-copy">
          Enter your name, email address, and phone number. Every submission is
          recorded in the connected Google Sheet.
        </p>
      </header>

      <main class="card">
        <section class="intro">
          <h2>Contact Form</h2>
          <p>
            Fill in your name, email address, and phone number, then press
            submit.
          </p>
        </section>

        <form id="commentForm" class="comment-form" novalidate>
          <label for="fullName">Name</label>
          <input
            id="fullName"
            name="fullName"
            type="text"
            maxlength="120"
            autocomplete="name"
            pattern="[A-Za-z ]+"
            title="Name can contain only letters and spaces."
            placeholder="Enter your full name"
            required
          />

          <label for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            maxlength="120"
            autocomplete="email"
            placeholder="Optional"
          />

          <label for="phone">Phone number</label>
          <input
            id="phone"
            name="phone"
            type="tel"
            maxlength="20"
            autocomplete="tel"
            inputmode="numeric"
            pattern="[0-9]+"
            title="Phone number can contain digits only."
            placeholder="Digits only"
            required
          />

          <div class="captcha-panel">
            <p class="captcha-label">Basic CAPTCHA check</p>
            <p class="captcha-question" id="captchaQuestion" data-answer="7">
              What is 3 + 4?
            </p>
            <label for="captchaAnswer">Your answer</label>
            <input
              id="captchaAnswer"
              name="captchaAnswer"
              type="number"
              inputmode="numeric"
              placeholder="Enter the answer"
              required
            />
          </div>

          <button id="submitButton" type="submit">Submit</button>
          <p id="statusMessage" class="status-message" aria-live="polite"></p>
        </form>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
